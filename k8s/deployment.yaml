---
apiVersion: v1
kind: Namespace
metadata:
  name: caf-automation
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: caf-automation-data
  namespace: caf-automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caf-backend
  namespace: caf-automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caf-backend
  template:
    metadata:
      labels:
        app: caf-backend
    spec:
      containers:
        - name: backend
          image: caf-automation-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATA_DIR
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: caf-automation-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caf-frontend
  namespace: caf-automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caf-frontend
  template:
    metadata:
      labels:
        app: caf-frontend
    spec:
      containers:
        - name: frontend
          image: caf-automation-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: caf-backend
  namespace: caf-automation
spec:
  selector:
    app: caf-backend
  ports:
    - port: 8000
      targetPort: 8000
---
# Option 1: ClusterIP (use with Ingress)
apiVersion: v1
kind: Service
metadata:
  name: caf-frontend
  namespace: caf-automation
spec:
  selector:
    app: caf-frontend
  ports:
    - port: 80
      targetPort: 80
---
# Option 2: NodePort (direct access without Ingress)
# Uncomment below and comment out the ClusterIP service above
# apiVersion: v1
# kind: Service
# metadata:
#   name: caf-frontend-nodeport
#   namespace: caf-automation
# spec:
#   type: NodePort
#   selector:
#     app: caf-frontend
#   ports:
#     - port: 80
#       targetPort: 80
#       nodePort: 30080  # Access via http://<any-node-ip>:30080
---
# Option 3: Ingress (recommended for production)
# Update the host to match your cluster domain
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: caf-automation-ingress
  namespace: caf-automation
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - host: caf-automation.example.com  # Change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: caf-frontend
                port:
                  number: 80
